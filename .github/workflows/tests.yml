name: Unit Tests

on:
  push:
    branches: [main, unittest_problem_plushydro]
  pull_request:
    branches: [main, unittest_problem_plushydro]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi
      - name: Run unittest
        run: |
          python -m unittest discover -v -s tests -p "test_assetra.py"
