name: Unit Tests

on:
  push:
    branches: [paper_edits]
  pull_request:
    branches: [pper_edits]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run unittest
        run: |
          python -m unittest discover -s . -p 'tests/test_assetra.py'